startup: true

nodes:
  - name: attacker
    image: vsc-ubuntu
    cpu: 1
    ram: 2048

  - name: victim
    image: vsc-ubuntu
    cpu: 1
    ram: 2048
    ports:
      - 21
      - 22
    scripts:
      - label: setup_challenge
        script: |
          #!/bin/bash
          useradd -m -s /bin/bash frank
          echo "frank:frankiepass369" | chpasswd

          apt-get update
          apt-get install -y vsftpd
          
          sed -i 's/anonymous_enable=NO/anonymous_enable=YES/' /etc/vsftpd.conf
          mkdir -p /srv/ftp
          chown -R ftp:ftp /srv/ftp

          echo "frankiepass369" > /srv/ftp/pass.txt
          echo "FLAG{ftp_anon_access_success}" > /srv/ftp/flag1.txt

          systemctl restart vsftpd
          systemctl enable ssh
          systemctl start ssh

networks:
  - name: lab_net
    subnet: 10.0.0.0/24

links:
  - node: attacker
    network: lab_net
    ip: 10.0.0.10
  - node: victim
    network: lab_net
    ip: 10.0.0.20
